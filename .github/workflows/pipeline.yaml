name: Production Deployment

on:
  push:
    branches: [ "main" ] # Triggers when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        # This matches the build logic in your Dockerfile[cite: 3]
        run: ./gradlew build -x test

      - name: Build Docker Image
        # This builds the image using the final multi-stage Dockerfile[cite: 3]
        run: docker build -t backend-app .

      - name: Deploy with Docker Compose
        # This is where the magic happens:
        # We map GitHub Secrets to the Env variables required by docker-compose.yml
        env:
          NEO4J_URI: ${{ secrets.PROD_NEO4J_URI }}
          NEO4J_USER: ${{ secrets.PROD_NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.PROD_NEO4J_PASSWORD }}
        run: |
          # Docker Compose uses the shell variables provided above
          # It ignores the .env file because it's not in the repo!
          docker compose up -d
